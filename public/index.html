<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <meta charset="UTF-8" />
  <title>Meal Planner</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#198754">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
  <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js")
      .then(() => console.log("Service Worker enregistré"));
  }
  </script>
<body>
    <body>

      <div class="container my-4">

        <h1 class="mb-4">🍽 Meal Planner</h1>

        <div class="row mb-4">
          <div class="col-md-4">
            <label class="form-label">Number of people</label>
            <input type="number" id="people" value="2" min="1" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Ingrédients à finir</label>
            <input type="text" id="ingredientsToUse" class="form-control" placeholder="ex: courge, chèvre">
          </div>

          <div class="col-md-2 d-flex align-items-end">
            <button onclick="generateWeek()" class="btn btn-primary w-100">
              Générer
            </button>
          </div>
        </div>

        <div class="row">
          <!-- RECIPES -->
          <div class="col-lg-7">
            <h2 class="mb-3">Recipes</h2>
            <div id="recipes"></div>
          </div>

          <!-- SHOPPING LIST -->
          <div class="col-lg-5">
            <h2 class="mb-3">Shopping List</h2>
            <div id="shopping"></div>
          </div>
        </div>

      </div>

      <script src="script.js"></script>

    </body>
</body>
</html>
