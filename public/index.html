<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- META BASIQUE -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Meal Planner</title>

  <!-- FAVICON CLASSIQUE -->
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- FAVICON PNG (navigateurs modernes) -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">

  <!-- APPLE -->
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <!-- ANDROID / PWA -->
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#198754">

  <!-- iOS PWA SUPPORT -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js")
        .then(() => console.log("Service Worker enregistré"));
    }
  </script>

  <div class="container my-4">

    <h1 class="mb-4">🍽 Meal Planner</h1>

    <div class="row mb-4">

      <div class="col-md-3">
        <label class="form-label">Number of people</label>
        <input type="number" id="people" value="2" min="1" class="form-control" />
      </div>

      <div class="col-md-5">
        <label class="form-label">Ingrédients à finir</label>
        <input type="text" id="ingredientsToUse" class="form-control" placeholder="ex: courge, chèvre">
      </div>

      <div class="col-md-2 d-flex align-items-end">
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" id="ignoreSeason">
          <label class="form-check-label" for="ignoreSeason">
            Ignorer saison
          </label>
        </div>
      </div>

      <div class="col-md-2 d-flex align-items-end">
        <button onclick="generateWeek()" class="btn btn-primary w-100">
          Générer
        </button>
      </div>

    </div>

    <div class="row">
      <!-- RECIPES -->
      <div class="col-lg-7">
        <h2 class="mb-3">Recipes</h2>
        <div id="recipes"></div>
      </div>

      <!-- SHOPPING LIST -->
      <div class="col-lg-5">
        <h2 class="mb-3">Shopping List</h2>
        <div id="shopping"></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
